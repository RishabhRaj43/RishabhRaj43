name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Generates the snake GIF and SVG
      - uses: Platane/snk@v2
        id: snake-gif
        with:
          github_user_name: RishabhRaj43
          # Adjust inputs according to the latest action documentation
          entryPoint: generate-snake
          args: "--output dist/github-contribution-grid-snake.gif --output-svg dist/github-contribution-grid-snake.svg"

      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Commit and Push changes
        run: |
          git add dist/*
          git commit -m "Update contribution graph"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
